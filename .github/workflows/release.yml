name: Release

on:
  workflow_dispatch:

permissions: {}

jobs:
  release:
    name: Build & Draft Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Extract version from source
        id: version
        run: |
          version=$(grep -m1 'Version.*=' internal/buildinfo/version.go | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$version" ]; then
            echo "::error::Could not extract Version from internal/buildinfo/version.go"
            exit 1
          fi
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists."
            exit 1
          fi

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve draft release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GoReleaser creates draft releases under an "untagged-*" slug,
          # so gh release upload by version tag returns 404. Look up the
          # actual tag GitHub assigned to the draft.
          release_tag=$(gh api "repos/${{ github.repository }}/releases" \
            --jq '[.[] | select(.draft and .tag_name == "${{ steps.version.outputs.tag }}")] | first | .tag_name')
          if [ -z "$release_tag" ] || [ "$release_tag" = "null" ]; then
            echo "::error::Could not find draft release for ${{ steps.version.outputs.tag }}"
            exit 1
          fi
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "Resolved draft release tag: $release_tag"

      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Locate binaries and packages
        id: binaries
        run: |
          # Windows .exes are uploaded to the draft release directly by GoReleaser
          # (formats: binary keeps the raw build outputs in dist/<id>_<os>_<arch>/
          # subdirs without renaming, only the upload uses the templated name).
          # The windows-sign-and-package job downloads them from the draft release,
          # so we don't need to locate them locally here.
          DARWIN=$(find dist -type f -name '*darwin_unnotarized' | head -1)
          LINUX_AMD64=$(find dist -type f -name 'stepsecurity-dev-machine-guard' -path '*linux_amd64*' | head -1)
          LINUX_ARM64=$(find dist -type f -name 'stepsecurity-dev-machine-guard' -path '*linux_arm64*' | head -1)

          DEB_AMD64=$(find dist -type f -name '*-amd64.deb' | head -1)
          DEB_ARM64=$(find dist -type f -name '*-arm64.deb' | head -1)
          RPM_AMD64=$(find dist -type f -name '*-amd64.rpm' | head -1)
          RPM_ARM64=$(find dist -type f -name '*-arm64.rpm' | head -1)

          for label in "darwin:${DARWIN}" "linux_amd64:${LINUX_AMD64}" "linux_arm64:${LINUX_ARM64}" "deb_amd64:${DEB_AMD64}" "deb_arm64:${DEB_ARM64}" "rpm_amd64:${RPM_AMD64}" "rpm_arm64:${RPM_ARM64}"; do
            name="${label%%:*}"
            path="${label#*:}"
            if [ -z "$path" ] || [ ! -f "$path" ]; then
              echo "::error::Artifact not found for ${name}"
              find dist -type f
              exit 1
            fi
          done

          echo "darwin=$DARWIN" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$LINUX_AMD64" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$LINUX_ARM64" >> "$GITHUB_OUTPUT"
          echo "deb_amd64=$DEB_AMD64" >> "$GITHUB_OUTPUT"
          echo "deb_arm64=$DEB_ARM64" >> "$GITHUB_OUTPUT"
          echo "rpm_amd64=$RPM_AMD64" >> "$GITHUB_OUTPUT"
          echo "rpm_arm64=$RPM_ARM64" >> "$GITHUB_OUTPUT"

      - name: Sign artifacts with Sigstore
        shell: bash
        run: |
          sign_with_retry() {
            local blob="$1"
            local bundle="$2"

            for attempt in 1 2 3; do
              if cosign sign-blob "$blob" --bundle "$bundle" --yes; then
                return 0
              fi
              echo "::warning::Signing attempt $attempt failed for $(basename "$blob"), retrying in 10s..."
              sleep 10
            done

            echo "::error::Signing failed for $(basename "$blob") after 3 attempts"
            return 1
          }

          # Windows .exes are signed in the windows-sign-and-package job after
          # Authenticode signing, so the cosign bundles match the bytes users
          # download from the published release.
          sign_with_retry "${{ steps.binaries.outputs.darwin }}" \
            "dist/stepsecurity-dev-machine-guard-darwin_unnotarized.bundle"
          sign_with_retry "${{ steps.binaries.outputs.linux_amd64 }}" \
            "dist/stepsecurity-dev-machine-guard-linux_amd64.bundle"
          sign_with_retry "${{ steps.binaries.outputs.linux_arm64 }}" \
            "dist/stepsecurity-dev-machine-guard-linux_arm64.bundle"
          sign_with_retry "${{ steps.binaries.outputs.deb_amd64 }}" \
            "${{ steps.binaries.outputs.deb_amd64 }}.bundle"
          sign_with_retry "${{ steps.binaries.outputs.deb_arm64 }}" \
            "${{ steps.binaries.outputs.deb_arm64 }}.bundle"
          sign_with_retry "${{ steps.binaries.outputs.rpm_amd64 }}" \
            "${{ steps.binaries.outputs.rpm_amd64 }}.bundle"
          sign_with_retry "${{ steps.binaries.outputs.rpm_arm64 }}" \
            "${{ steps.binaries.outputs.rpm_arm64 }}.bundle"

      - name: Upload cosign bundles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Windows .exe bundles are uploaded by the windows-sign-and-package job.
          gh release upload "${{ steps.release.outputs.tag }}" \
            dist/stepsecurity-dev-machine-guard-darwin_unnotarized.bundle \
            dist/stepsecurity-dev-machine-guard-linux_amd64.bundle \
            dist/stepsecurity-dev-machine-guard-linux_arm64.bundle \
            "${{ steps.binaries.outputs.deb_amd64 }}.bundle" \
            "${{ steps.binaries.outputs.deb_arm64 }}.bundle" \
            "${{ steps.binaries.outputs.rpm_amd64 }}.bundle" \
            "${{ steps.binaries.outputs.rpm_arm64 }}.bundle" \
            --clobber

      - name: Attest build provenance
        # Windows .exe and MSI attestations are emitted by the
        # windows-sign-and-package job after Authenticode signing.
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            ${{ steps.binaries.outputs.darwin }}
            ${{ steps.binaries.outputs.linux_amd64 }}
            ${{ steps.binaries.outputs.linux_arm64 }}
            ${{ steps.binaries.outputs.deb_amd64 }}
            ${{ steps.binaries.outputs.deb_arm64 }}
            ${{ steps.binaries.outputs.rpm_amd64 }}
            ${{ steps.binaries.outputs.rpm_arm64 }}

  windows-sign-and-package:
    name: Sign Windows binaries, build & sign MSIs
    needs: release
    runs-on: windows-latest
    # The `release` environment (lowercase â€” must match the GitHub Environment
    # name exactly) requires two reviewers and is restricted to main. The Azure
    # Federated Identity Credential is bound to this environment's OIDC subject,
    # so azure/login below only works from jobs that gate on this environment.
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        # trusted-signing-action talks to wus2.codesigning.azure.net,
        # login.microsoftonline.com, timestamp.acs.microsoft.com, and Azure
        # storage CDNs. Audit mode logs warnings without blocking â€” capture
        # the full endpoint list before switching to block mode.
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install WiX 4 + Util extension
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix --version
          wix extension add --global WixToolset.Util.wixext/4.0.5
          wix extension list --global

      - name: Download Windows .exe assets from draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ needs.release.outputs.release_tag }}"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          gh release download "$tag" `
            -R "${{ github.repository }}" `
            -p "*-windows_amd64.exe" `
            -p "*-windows_arm64.exe" `
            -D dist
          Get-ChildItem dist | Format-Table Name, Length

      - name: Resolve Windows binary paths
        id: paths
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $amd64     = Get-ChildItem dist -Filter "stepsecurity-dev-machine-guard-*-windows_amd64.exe" | Where-Object Name -NotLike '*-task-*' | Select-Object -First 1
          $arm64     = Get-ChildItem dist -Filter "stepsecurity-dev-machine-guard-*-windows_arm64.exe" | Where-Object Name -NotLike '*-task-*' | Select-Object -First 1
          $taskAmd64 = Get-ChildItem dist -Filter "stepsecurity-dev-machine-guard-task-*-windows_amd64.exe" | Select-Object -First 1
          $taskArm64 = Get-ChildItem dist -Filter "stepsecurity-dev-machine-guard-task-*-windows_arm64.exe" | Select-Object -First 1
          if (-not $amd64 -or -not $arm64 -or -not $taskAmd64 -or -not $taskArm64) {
            Write-Error "Windows .exe assets (agent + launcher, both arches) missing under dist/"
            Get-ChildItem dist | Format-Table Name
            exit 1
          }
          # trusted-signing-action v2 requires absolute (rooted) paths in `files:`.
          "amd64=$($amd64.FullName)"          | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "arm64=$($arm64.FullName)"          | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "task_amd64=$($taskAmd64.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "task_arm64=$($taskArm64.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Authenticode-sign Windows .exes
        uses: Azure/trusted-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_TS_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_TS_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_TS_CERT_PROFILE_NAME }}
          files: |
            ${{ steps.paths.outputs.amd64 }}
            ${{ steps.paths.outputs.arm64 }}
            ${{ steps.paths.outputs.task_amd64 }}
            ${{ steps.paths.outputs.task_arm64 }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          # Disable the action's same-job module cache to avoid a silent-exit
          # bug when this action runs twice in the same job. See "Authenticode-sign MSIs"
          # below â€” when both invocations get same-key cache hits, the second
          # invocation dies without logging an error.
          cache-dependencies: false

      - name: Verify .exe signatures
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $failed = $false
          foreach ($f in @(
            '${{ steps.paths.outputs.amd64 }}',
            '${{ steps.paths.outputs.arm64 }}',
            '${{ steps.paths.outputs.task_amd64 }}',
            '${{ steps.paths.outputs.task_arm64 }}'
          )) {
            $sig = Get-AuthenticodeSignature $f
            $subject = if ($sig.SignerCertificate) { $sig.SignerCertificate.Subject } else { '<none>' }
            Write-Host "$(Split-Path $f -Leaf): Status=$($sig.Status), Signer=$subject"
            if ($sig.Status -ne 'Valid') {
              Write-Host "::error::Signature status is $($sig.Status) (expected Valid) for $f"
              $failed = $true
            }
            if (-not $sig.TimeStamperCertificate) {
              Write-Host "::error::No RFC3161 timestamp on $f"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign signed .exes with Sigstore
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.release.outputs.version }}"

          sign_with_retry() {
            local blob="$1"
            local bundle="$2"
            for attempt in 1 2 3; do
              if cosign sign-blob "$blob" --bundle "$bundle" --yes; then
                return 0
              fi
              echo "::warning::Signing attempt $attempt failed for $(basename "$blob"), retrying in 10s..."
              sleep 10
            done
            echo "::error::Signing failed for $(basename "$blob") after 3 attempts"
            return 1
          }

          sign_with_retry "dist/stepsecurity-dev-machine-guard-${version}-windows_amd64.exe" \
            "dist/stepsecurity-dev-machine-guard-windows_amd64.exe.bundle"
          sign_with_retry "dist/stepsecurity-dev-machine-guard-${version}-windows_arm64.exe" \
            "dist/stepsecurity-dev-machine-guard-windows_arm64.exe.bundle"
          sign_with_retry "dist/stepsecurity-dev-machine-guard-task-${version}-windows_amd64.exe" \
            "dist/stepsecurity-dev-machine-guard-task-windows_amd64.exe.bundle"
          sign_with_retry "dist/stepsecurity-dev-machine-guard-task-${version}-windows_arm64.exe" \
            "dist/stepsecurity-dev-machine-guard-task-windows_arm64.exe.bundle"

      - name: Upload signed .exes and bundles to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.release.outputs.release_tag }}"
          version="${{ needs.release.outputs.version }}"
          gh release upload "$tag" \
            "dist/stepsecurity-dev-machine-guard-${version}-windows_amd64.exe" \
            "dist/stepsecurity-dev-machine-guard-${version}-windows_arm64.exe" \
            "dist/stepsecurity-dev-machine-guard-task-${version}-windows_amd64.exe" \
            "dist/stepsecurity-dev-machine-guard-task-${version}-windows_arm64.exe" \
            dist/stepsecurity-dev-machine-guard-windows_amd64.exe.bundle \
            dist/stepsecurity-dev-machine-guard-windows_arm64.exe.bundle \
            dist/stepsecurity-dev-machine-guard-task-windows_amd64.exe.bundle \
            dist/stepsecurity-dev-machine-guard-task-windows_arm64.exe.bundle \
            --clobber

      - name: Attest .exe build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            ${{ steps.paths.outputs.amd64 }}
            ${{ steps.paths.outputs.arm64 }}
            ${{ steps.paths.outputs.task_amd64 }}
            ${{ steps.paths.outputs.task_arm64 }}

      - name: Build MSIs (x64 + arm64)
        id: msi
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "${{ needs.release.outputs.version }}"

          wix build packaging/windows/Product.wxs `
            -arch x64 `
            -ext WixToolset.Util.wixext `
            -d Arch=x64 `
            -d "Version=$version" `
            -d "BinaryPath=${{ steps.paths.outputs.amd64 }}" `
            -d "LauncherPath=${{ steps.paths.outputs.task_amd64 }}" `
            -out "dist/stepsecurity-dev-machine-guard-$version-x64.msi"

          wix build packaging/windows/Product.wxs `
            -arch arm64 `
            -ext WixToolset.Util.wixext `
            -d Arch=arm64 `
            -d "Version=$version" `
            -d "BinaryPath=${{ steps.paths.outputs.arm64 }}" `
            -d "LauncherPath=${{ steps.paths.outputs.task_arm64 }}" `
            -out "dist/stepsecurity-dev-machine-guard-$version-arm64.msi"

          $x64   = (Get-Item "dist/stepsecurity-dev-machine-guard-$version-x64.msi").FullName
          $arm64 = (Get-Item "dist/stepsecurity-dev-machine-guard-$version-arm64.msi").FullName
          "x64=$x64"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "arm64=$arm64" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          Get-ChildItem dist -Filter "*.msi" | Format-Table Name, Length

      - name: Authenticode-sign MSIs
        uses: Azure/trusted-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_TS_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_TS_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_TS_CERT_PROFILE_NAME }}
          files: |
            ${{ steps.msi.outputs.x64 }}
            ${{ steps.msi.outputs.arm64 }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          # Same workaround as the .exe sign step above â€” disable in-job cache
          # to avoid the silent-exit bug when both invocations get cache hits.
          cache-dependencies: false

      - name: Verify MSI signatures
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $failed = $false
          foreach ($msi in @('${{ steps.msi.outputs.x64 }}', '${{ steps.msi.outputs.arm64 }}')) {
            $sig = Get-AuthenticodeSignature $msi
            $subject = if ($sig.SignerCertificate) { $sig.SignerCertificate.Subject } else { '<none>' }
            Write-Host "$(Split-Path $msi -Leaf): Status=$($sig.Status), Signer=$subject"
            if ($sig.Status -ne 'Valid') {
              Write-Host "::error::MSI signature status is $($sig.Status) (expected Valid) for $msi"
              $failed = $true
            }
            if (-not $sig.TimeStamperCertificate) {
              Write-Host "::error::No RFC3161 timestamp on $msi"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }

      - name: Sign MSIs with Sigstore
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.release.outputs.version }}"
          for arch in x64 arm64; do
            msi="dist/stepsecurity-dev-machine-guard-${version}-${arch}.msi"
            bundle="${msi}.bundle"
            for attempt in 1 2 3; do
              if cosign sign-blob "$msi" --bundle "$bundle" --yes; then
                echo "Signed $msi"
                break
              fi
              echo "::warning::Sign attempt $attempt failed for $msi, retrying in 10s..."
              sleep 10
            done
            test -f "$bundle" || { echo "::error::Failed to sign $msi"; exit 1; }
          done

      - name: Upload MSIs and bundles to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.release.outputs.release_tag }}"
          version="${{ needs.release.outputs.version }}"
          gh release upload "$tag" \
            "dist/stepsecurity-dev-machine-guard-${version}-x64.msi" \
            "dist/stepsecurity-dev-machine-guard-${version}-arm64.msi" \
            "dist/stepsecurity-dev-machine-guard-${version}-x64.msi.bundle" \
            "dist/stepsecurity-dev-machine-guard-${version}-arm64.msi.bundle" \
            --clobber

      - name: Attest MSI build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            ${{ steps.msi.outputs.x64 }}
            ${{ steps.msi.outputs.arm64 }}

      - name: Download IntuneWinAppUtil.exe (pinned)
        shell: pwsh
        run: |
          # Microsoft/Microsoft-Win32-Content-Prep-Tool v1.8.7 (FIPS-compliant
          # SHA-256, added -q silent mode).
          # https://github.com/microsoft/Microsoft-Win32-Content-Prep-Tool/releases/tag/v1.8.7
          # Tag v1.8.7 -> commit 1d6cfcbdf8c28edc596337031f74df951f38f718.
          # The binary is committed directly to the repo (no release-asset CDN),
          # so we pull it via the commit-pinned raw URL (immutable). The pinned
          # SHA-256 below is the canonical file hash; the next step double-
          # checks Microsoft's Authenticode signature on top.
          $ErrorActionPreference = 'Stop'
          $url    = 'https://raw.githubusercontent.com/microsoft/Microsoft-Win32-Content-Prep-Tool/1d6cfcbdf8c28edc596337031f74df951f38f718/IntuneWinAppUtil.exe'
          $sha256 = 'c1ba45b5cb939e84af064bb7ff4b38fb3dfe33c8dc1078fd9b157672eae671f6'
          $dst    = 'dist/tools/IntuneWinAppUtil.exe'
          New-Item -ItemType Directory -Path (Split-Path $dst) -Force | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $dst -UseBasicParsing
          $actual = (Get-FileHash -Path $dst -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $sha256) {
            Write-Error "IntuneWinAppUtil.exe SHA-256 mismatch -- expected $sha256, got $actual"
            exit 1
          }
          Write-Host "IntuneWinAppUtil.exe SHA-256 verified: $actual"

      - name: Verify IntuneWinAppUtil.exe Microsoft Authenticode signature
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $sig = Get-AuthenticodeSignature 'dist/tools/IntuneWinAppUtil.exe'
          $subject = if ($sig.SignerCertificate) { $sig.SignerCertificate.Subject } else { '<none>' }
          Write-Host "IntuneWinAppUtil.exe: Status=$($sig.Status), Signer=$subject"
          if ($sig.Status -ne 'Valid') {
            Write-Error "IntuneWinAppUtil.exe signature status is $($sig.Status), expected Valid"
            exit 1
          }
          if ($subject -notlike '*Microsoft Corporation*') {
            Write-Error "IntuneWinAppUtil.exe not signed by Microsoft Corporation (subject: $subject)"
            exit 1
          }

      - name: Pack .intunewin (x64 + arm64)
        id: intunewin
        shell: pwsh
        run: |
          # IntuneWinAppUtil takes a SOURCE FOLDER (-c) and a SETUP FILE within
          # it (-s); it packs the folder's contents into the .intunewin and
          # records the setup file as the install entry point.
          #
          # The setup file is install.cmd (NOT the MSI directly). The wrapper
          # forces verbose logging to %ProgramData%\StepSecurity\install.log on
          # every deploy, forwards Intune's install-command args (APIKEY etc.)
          # to msiexec via %*, and matches the MSI by wildcard so the command
          # stays version-agnostic. uninstall.cmd ships alongside so the Intune
          # uninstall command is a single uniform string across every version in
          # a supersedence chain. The signed MSI is bundled in the same folder.
          #
          # The MSI's Authenticode signature is preserved verbatim inside the
          # encrypted payload -- IME extracts and runs the same signed bytes on
          # the endpoint, so the trust chain (Azure Trusted Signing -> MSI ->
          # MSI-inside-.intunewin -> MSI-extracted-on-device) holds end-to-end.
          #
          # The .intunewin format itself is an encrypted ZIP and cannot be
          # Authenticode-signed (not a PE/MSI/CAB/CAT). Sigstore signing below
          # provides outer-layer transparency-log attestation.
          $ErrorActionPreference = 'Stop'
          $version = "${{ needs.release.outputs.version }}"
          $tool    = 'dist/tools/IntuneWinAppUtil.exe'

          foreach ($arch in @('x64', 'arm64')) {
            $msiName = "stepsecurity-dev-machine-guard-$version-$arch.msi"
            $stage   = "dist/intunewin-staging-$arch"
            New-Item -ItemType Directory -Path $stage -Force | Out-Null
            Copy-Item -Path "dist/$msiName"                        -Destination $stage -Force
            Copy-Item -Path "packaging/windows/intune/install.cmd"   -Destination $stage -Force
            Copy-Item -Path "packaging/windows/intune/uninstall.cmd" -Destination $stage -Force

            & $tool -c $stage -s install.cmd -o dist -q
            if ($LASTEXITCODE -ne 0) {
              Write-Error "IntuneWinAppUtil.exe failed for $arch (exit $LASTEXITCODE)"
              exit 1
            }
            Remove-Item -Path $stage -Recurse -Force

            # IntuneWinAppUtil names the output after the setup file
            # (install.intunewin); rename to the versioned, arch-tagged filename.
            $produced = "dist/install.intunewin"
            if (-not (Test-Path $produced)) {
              Write-Error "Expected output not found: $produced"
              exit 1
            }
            $final = "dist/stepsecurity-dev-machine-guard-$version-$arch.intunewin"
            if (Test-Path $final) { Remove-Item -Path $final -Force }
            Move-Item -Path $produced -Destination $final
            $full = (Get-Item $final).FullName
            "$arch=$full" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

          Get-ChildItem dist -Filter "*.intunewin" | Format-Table Name, Length

      - name: Sign .intunewin with Sigstore
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.release.outputs.version }}"
          for arch in x64 arm64; do
            blob="dist/stepsecurity-dev-machine-guard-${version}-${arch}.intunewin"
            bundle="${blob}.bundle"
            for attempt in 1 2 3; do
              if cosign sign-blob "$blob" --bundle "$bundle" --yes; then
                echo "Signed $blob"
                break
              fi
              echo "::warning::Sign attempt $attempt failed for $blob, retrying in 10s..."
              sleep 10
            done
            test -f "$bundle" || { echo "::error::Failed to sign $blob"; exit 1; }
          done

      - name: Upload .intunewin and bundles to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.release.outputs.release_tag }}"
          version="${{ needs.release.outputs.version }}"
          gh release upload "$tag" \
            "dist/stepsecurity-dev-machine-guard-${version}-x64.intunewin" \
            "dist/stepsecurity-dev-machine-guard-${version}-arm64.intunewin" \
            "dist/stepsecurity-dev-machine-guard-${version}-x64.intunewin.bundle" \
            "dist/stepsecurity-dev-machine-guard-${version}-arm64.intunewin.bundle" \
            --clobber

      - name: Attest .intunewin build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            ${{ steps.intunewin.outputs.x64 }}
            ${{ steps.intunewin.outputs.arm64 }}
