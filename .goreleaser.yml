version: 2
project_name: stepsecurity-dev-machine-guard

builds:
  - id: stepsecurity-dev-machine-guard
    main: ./cmd/stepsecurity-dev-machine-guard
    binary: stepsecurity-dev-machine-guard
    goos:
      - darwin
      - windows
      - linux
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/step-security/dev-machine-guard/internal/buildinfo.GitCommit={{.FullCommit}}
      - -X github.com/step-security/dev-machine-guard/internal/buildinfo.ReleaseTag={{.Tag}}
      - -X github.com/step-security/dev-machine-guard/internal/buildinfo.ReleaseBranch={{.Branch}}
    env:
      - CGO_ENABLED=0

  # GUI-subsystem launcher invoked by Windows Task Scheduler so the
  # console-subsystem agent never gets a console window allocated.
  # -H windowsgui flips the PE subsystem; otherwise identical config.
  - id: stepsecurity-dev-machine-guard-task
    main: ./cmd/stepsecurity-dev-machine-guard-task
    binary: stepsecurity-dev-machine-guard-task
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -H windowsgui
      - -X github.com/step-security/dev-machine-guard/internal/buildinfo.GitCommit={{.FullCommit}}
      - -X github.com/step-security/dev-machine-guard/internal/buildinfo.ReleaseTag={{.Tag}}
      - -X github.com/step-security/dev-machine-guard/internal/buildinfo.ReleaseBranch={{.Branch}}
    env:
      - CGO_ENABLED=0

universal_binaries:
  - id: universal
    ids:
      - stepsecurity-dev-machine-guard
    replace: true
    name_template: "stepsecurity-dev-machine-guard-{{ .Version }}-darwin_unnotarized"

archives:
  - id: darwin
    ids:
      - universal
    formats:
      - binary
    name_template: "stepsecurity-dev-machine-guard-{{ .Version }}-darwin_unnotarized"
  - id: windows-linux
    ids:
      - stepsecurity-dev-machine-guard
    formats:
      - binary
    name_template: "stepsecurity-dev-machine-guard-{{ .Version }}-{{ .Os }}_{{ .Arch }}"
    allow_different_binary_count: true
  - id: windows-task
    ids:
      - stepsecurity-dev-machine-guard-task
    formats:
      - binary
    name_template: "stepsecurity-dev-machine-guard-task-{{ .Version }}-{{ .Os }}_{{ .Arch }}"
    allow_different_binary_count: true

nfpms:
  - id: linux-packages
    package_name: stepsecurity-dev-machine-guard
    vendor: StepSecurity
    homepage: https://github.com/step-security/dev-machine-guard
    maintainer: StepSecurity <support@stepsecurity.io>
    description: Detect compromised tools on developer machines
    license: Apache-2.0
    formats:
      - deb
      - rpm
    ids:
      - stepsecurity-dev-machine-guard
    bindir: /usr/local/bin
    file_name_template: "stepsecurity-dev-machine-guard-{{ .Version }}-{{ .Arch }}"

release:
  draft: true
